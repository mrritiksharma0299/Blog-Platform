{% extends "base.html" %}


{% block content %}


<div class="edit-profile-page">


    <div class="edit-card">


        <h2>
            Edit Profile
        </h2>


        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}


            <div class="form-group">

                {{ user_form.as_p }}

            </div>


            <div class="form-group">

                {{ profile_form.as_p }}

            </div>


            <button class="save-btn">

                Save Changes

            </button>


        </form>


    </div>


</div>


{% endblock %}
